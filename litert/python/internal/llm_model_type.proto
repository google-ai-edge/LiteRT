// TODO(b/445163709): Remove this module once litert_lm publishes a pypi
// package.

syntax = "proto3";

package litert.lm.proto;

import "litert/python/internal/token.proto";

// The model type of the LLM.
message LlmModelType {
  // The model type here are predefined model types that LiteRT-LM team
  // supports.
  oneof model_type {
    GenericModel generic_model = 1;
    Gemma3N gemma3n = 2;
    FunctionGemma function_gemma = 3;
    Gemma3 gemma3 = 4;
    Qwen3 qwen3 = 5;
    Qwen2p5 qwen2p5 = 7;
    Gemma4 gemma4 = 8;
    FastVlm fast_vlm = 9;
  }
  reserved 6;
}

// The default model type for the generic model.
message GenericModel {
  // The model role to use for the model.
  optional string model_role = 1;
  // If true, force the content from the model to be a string instead of an
  // array. Some legacy templates only support string content.
  optional bool force_string_content = 2;

  // --- Multimodal Configurations ---

  // High-level switches
  // Whether to enable image modality.
  optional bool image_enabled = 3;
  // Whether to enable audio modality.
  optional bool audio_enabled = 4;

  // Delimiters & Matchers
  // Regex to split the prompt into chunks for multimodal processing.
  optional string delimiter_regex = 5;
  // Regex to match image token placeholders in the prompt.
  optional string image_token_regex = 6;
  // Regex to match audio token placeholders in the prompt.
  optional string audio_token_regex = 7;

  // Image preprocessing parameters
  // The height of the image tensor that image preprocessor should resize to.
  optional int32 image_tensor_height = 8;
  // The width of the image tensor that image preprocessor should resize to.
  optional int32 image_tensor_width = 9;

  // Optional patchify config
  // The width of the image patch that the image preprocessor should patchify
  // the image to.
  optional int32 patch_width = 10;
  // The height of the image patch that the image preprocessor should patchify
  // the image to.
  optional int32 patch_height = 11;
  // The maximum number of patches that the image preprocessor should patchify
  // the image to. If the number of patches that the patchified input image
  // would produce is more than this, the input image will be downsampled to the
  // max size that can fit the max number of patches, with respect to the aspect
  // ratio, before patchifying.
  optional int32 max_num_patches = 12;
  // The pooling kernel size that the image preprocessor should use for
  // patchifying the image.
  optional int32 pooling_kernel_size = 13;

  // Image formatting
  // The start of image token indicates the start of image in the prompt.
  optional TokenUnion start_of_image_token = 14;
  // The end of image token indicates the end of image in the prompt.
  optional TokenUnion end_of_image_token = 15;
  // The prefix to add before the image in the prompt.
  optional string image_prefix = 16;
  // The suffix to add after the image in the prompt.
  optional string image_suffix = 17;
  // Whether to add the end of image token after the image in the prompt.
  optional bool add_image_end = 18;

  // Audio preprocessing parameters
  // Whether to skip the Mel spectrogram extraction.
  optional bool skip_mel_spectrogram_extraction = 19;
  // The sample rate of the audio input.
  optional int32 audio_sample_rate_hz = 20;
  // The number of audio channels.
  optional int32 audio_num_channels = 21;
  // The length of the audio frame in samples.
  optional int32 audio_frame_length = 22;
  // The hop length of the audio frame in samples.
  optional int32 audio_hop_length = 23;
  // The length of the FFT in samples.
  optional int32 audio_fft_length = 24;
  // The scale factor to apply to the audio input.
  optional float audio_input_scale = 25;
  // The pre-emphasis factor of the audio input.
  optional float audio_pre_emphasis_factor = 26;
  // The number of mel bins in the audio mel spectrogram.
  optional int32 audio_num_mel_bins = 27;
  // The lowest frequency in Hz of the audio mel spectrogram.
  optional float audio_mel_low_hz = 28;
  // The highest frequency in Hz of the audio mel spectrogram.
  optional float audio_mel_high_hz = 29;
  // The floor of the audio mel spectrogram.
  optional float audio_mel_floor = 30;
  // Whether to normalize the audio mel spectrogram.
  optional bool audio_normalize_mel = 31;
  // Whether to add the floor to the audio mel spectrogram before taking the
  // log.
  optional bool audio_add_floor_to_mel_before_log = 32;
  // Whether to pad the audio semicausally.
  optional bool audio_semicausal_padding = 33;
  // Whether to use a non-zero hanning window for the audio FFT.
  optional bool audio_non_zero_hanning = 34;
  // Whether to use a periodic hanning window for the audio FFT.
  optional bool audio_periodic_hanning = 35;
  // The padding type of for FFT bins.
  optional FftPaddingType audio_fft_padding_type = 36;

  // Audio formatting
  // The start of audio token indicates the start of audio in the prompt.
  optional TokenUnion start_of_audio_token = 37;
  // The end of audio token indicates the end of audio in the prompt.
  optional TokenUnion end_of_audio_token = 38;
  // The prefix to add before the audio in the prompt.
  optional string audio_prefix = 39;
  // The suffix to add after the audio in the prompt.
  optional string audio_suffix = 40;
  // Whether to add the end of audio token after the audio in the prompt.
  optional bool add_audio_end = 41;
}

// Google's Gemma3N model.
message Gemma3N {
  // Vision modality.
  // The start of image token indicates the start of image in the prompt.
  TokenUnion start_of_image_token = 1;
  // The end of image token indicates the end of image in the prompt.
  TokenUnion end_of_image_token = 2;
  // The height of the image tensor that image preprocessor should resize to.
  int32 image_tensor_height = 3;
  // The width of the image tensor that image preprocessor should resize to.
  int32 image_tensor_width = 4;

  // Audio modality.
  // The start of audio token indicates the start of audio in the prompt.
  TokenUnion start_of_audio_token = 5;
  // The end of audio token indicates the end of audio in the prompt.
  TokenUnion end_of_audio_token = 6;
}

// The constraint mode when constrained decoding is enabled.
enum ConstraintMode {
  CONSTRAINT_MODE_UNSPECIFIED = 0;
  // Both function call and text output are allowed.
  CONSTRAINT_MODE_TEXT_AND_OR = 1;
  // Only function call is allowed.
  CONSTRAINT_MODE_FUNCTION_CALL_ONLY = 2;
}

// The padding type of for FFT bins.
enum FftPaddingType {
  FFT_PADDING_TYPE_UNSPECIFIED = 0;
  FFT_PADDING_TYPE_RIGHT = 1;
  FFT_PADDING_TYPE_CENTER = 2;
}

// Google's Function Gemma model.
message FunctionGemma {
  reserved 1, 2, 3, 4;

  // Options for tool calling.
  // Signifies the beginning of a tool call.
  string code_fence_start = 5;
  // Signifies the end of tool call.
  string code_fence_end = 6;
  // The syntax type of the tool call.
  string syntax_type = 7;
  // Whether to escape the fence strings for regex matching.
  bool escape_fence_strings = 8;
  // An optional regex to match each line of the tool code block.
  string tool_code_regex = 9;
  // The open quote for string arguments.
  string open_quote = 10;
  // The close quote for string arguments.
  string close_quote = 11;
  // Signifies the start of function response.
  string function_response_start = 12;
  // Whether to use the chat template for applying FC format.
  bool use_template_for_fc_format = 13;
  // The constraint mode when constrained decoding is enabled.
  ConstraintMode constraint_mode = 14;
}

// Google's Gemma3 model.
message Gemma3 {
  // Vision modality.
  // The start of image token indicates the start of image in the prompt.
  TokenUnion start_of_image_token = 1;
  // The end of image token indicates the end of image in the prompt.
  TokenUnion end_of_image_token = 2;
  // The height of the image tensor that image preprocessor should resize to.
  int32 image_tensor_height = 3;
  // The width of the image tensor that image preprocessor should resize to.
  int32 image_tensor_width = 4;
}

// Qwen3 model.
message Qwen3 {
  // Options for tool calling.
  // Signifies the beginning of a tool call.
  optional string code_fence_start = 1;
  // Signifies the end of tool call.
  optional string code_fence_end = 2;
  // Whether to escape the fence strings for regex matching.
  optional bool escape_fence_strings = 3;
  // An optional regex to match each line of the tool code block.
  optional string tool_code_regex = 4;
}

// Qwen2.5 model.
message Qwen2p5 {
  // Options for tool calling.
  // Signifies the beginning of a tool call.
  optional string code_fence_start = 1;
  // Signifies the end of tool call.
  optional string code_fence_end = 2;
  // Whether to escape the fence strings for regex matching.
  optional bool escape_fence_strings = 3;
  // An optional regex to match each line of the tool code block.
  optional string tool_code_regex = 4;
}

// Google's Gemma4 model.
message Gemma4 {
  // Vision modality.
  // The start of image token indicates the start of image in the prompt.
  TokenUnion start_of_image_token = 1;
  // The end of image token indicates the end of image in the prompt.
  TokenUnion end_of_image_token = 2;

  // The patch width that the image preprocessor should patchify the image to.
  int32 patch_width = 15;
  // The patch height that the image preprocessor should patchify the image to.
  int32 patch_height = 16;

  // The maximum number of patches that the image preprocessor should patchify
  // the image to. If the number of patches that the patchified input image
  // would produce is more than this, the input image will be downsampled to the
  // max size that can fit the max number of patches, with respect to the aspect
  // ratio, before patchifying.
  int32 max_num_patches = 17;

  // The pooling kernel size that the image preprocessor should use for
  // patchifying the image.
  int32 pooling_kernel_size = 18;

  // Audio modality.
  // The start of audio token indicates the start of audio in the prompt.
  TokenUnion start_of_audio_token = 3;
  // The end of audio token indicates the end of audio in the prompt.
  TokenUnion end_of_audio_token = 4;

  // Whether to skip the Mel spectrogram extraction.
  bool skip_mel_spectrogram_extraction = 19;

  // Options for tool calling.
  // Signifies the beginning of a tool call.
  string code_fence_start = 5;
  // Signifies the end of tool call.
  string code_fence_end = 6;
  // The syntax type of the tool call.
  string syntax_type = 7;
  // Whether to escape the fence strings for regex matching.
  bool escape_fence_strings = 8;
  // An optional regex to match each line of the tool code block.
  string tool_code_regex = 9;
  // The open quote for string arguments.
  string open_quote = 10;
  // The close quote for string arguments.
  string close_quote = 11;
  // Signifies the start of function response.
  string function_response_start = 12;
  // Whether to use the chat template for applying FC format.
  bool use_template_for_fc_format = 13;
  // The constraint mode when constrained decoding is enabled.
  ConstraintMode constraint_mode = 14;
}

// FastVLM model.
message FastVlm {
  // Vision modality.
  // The height of the image tensor that image preprocessor should resize to.
  int32 image_tensor_height = 3;
  // The width of the image tensor that image preprocessor should resize to.
  int32 image_tensor_width = 4;

  reserved 1, 2;
}
