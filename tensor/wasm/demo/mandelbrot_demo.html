<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteRT WASM Mandelbrot Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    canvas { border: 1px solid black; }
    #info { margin-top: 10px; font-weight: bold; }
    #perf { font-family: monospace; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>LiteRT WASM Mandelbrot Demo</h1>
  <canvas id="outputCanvas" width="256" height="256"></canvas>
  <div id="info">Initializing...</div>
  <div id="perf"></div>
  <div style="margin-top: 10px; margin-bottom: 10px;">
    <button id="restartBtn">Restart</button>
  </div>
 
  <!-- Load Emscripten WebAssembly sandbox -->
  <script src="../tensor_wasm_internal.js"></script>
  <script type="module">
    import { createLiteRT } from '../tensor_wasm.js';

    async function runDemo() {
      const infoDiv = document.getElementById('info');
      const perfDiv = document.getElementById('perf');
      const canvas = document.getElementById('outputCanvas');
      const ctx = canvas.getContext('2d');
 
      // Request WebGPU adapter and device
      if (!navigator.gpu) {
        infoDiv.textContent = "Error: WebGPU is not supported by this browser.";
        return;
      }
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();

      infoDiv.textContent = "Initializing LiteRT WASM module...";
      // Load the LiteRT WebAssembly module cleanly using createLiteRT!
      const litert = await createLiteRT({
        preinitializedWebGPUDevice: device
      });
 
      const H = 256;
      const W = 256;
 
      // 1. Create Tensors for Graph
      // 1. Eagerly allocate placeholders conformed to JIT sizes
      const cReal = litert.createTensor({ type: "FP32", shape: [1, H, W, 1], name: "cReal" });
      const cImag = litert.createTensor({ type: "FP32", shape: [1, H, W, 1], name: "cImag" });
      const zRealIn = litert.createTensor({ type: "FP32", shape: [1, H, W, 1], name: "zRealIn" });
      const zImagIn = litert.createTensor({ type: "FP32", shape: [1, H, W, 1], name: "zImagIn" });
      const upperBound = litert.createTensor({ type: "FP32", shape: [1, 1, 1, 1], name: "upperBound" });
      const lowerBound = litert.createTensor({ type: "FP32", shape: [1, 1, 1, 1], name: "lowerBound" });

      // 2. Define the Mandelbrot iteration JIT Graph Compiler pipeline
      const mandelbrotStep = litert.jit((cr, ci, zr, zi, ub, lb) => {
        const zRealSq = zr.mul(zr);
        const zImagSq = zi.mul(zi);
        const newZReal = zRealSq.sub(zImagSq).add(cr);
        const newZImag = zr.mul(zi).add(zr.mul(zi)).add(ci);
        const zRealOut = newZReal.minimum(ub).maximum(lb);
        const zImagOut = newZImag.minimum(ub).maximum(lb);
        const magnitudeSq = zRealOut.mul(zRealOut).add(zImagOut.mul(zImagOut));
        return [zRealOut, zImagOut, magnitudeSq];
      }, { accelerators: litert.HwAccelerators.CPU });

      infoDiv.textContent = "Compiling JIT graph compiler upfront...";
      await mandelbrotStep.compile(cReal, cImag, zRealIn, zImagIn, upperBound, lowerBound);

      document.getElementById('restartBtn').addEventListener('click', async () => {
        await compute();
      });
 
      // Initialize C_real and C_imag for Mandelbrot
      let xMin = -2.5, xMax = 1.0;
      let yMin = -1.5, yMax = 1.5;
  
      const cRealData = new Float32Array(H * W);
      const cImagData = new Float32Array(H * W);
 
      async function compute() {
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const idx = y * W + x;
            cRealData[idx] = xMin + (xMax - xMin) * x / W;
            cImagData[idx] = yMin + (yMax - yMin) * y / H;
          }
        }
        
        await cReal.setData(cRealData);
        await cImag.setData(cImagData);
        
        await upperBound.setData(new Float32Array([100.0]));
        await lowerBound.setData(new Float32Array([-100.0]));
 
        let currentZReal = new Float32Array(H * W).fill(0);
        let currentZImag = new Float32Array(H * W).fill(0);
        const escapeTimes = new Int32Array(H * W).fill(0);
  
        let step = 0;
        const maxSteps = 100;
  
        async function animLoop() {
          if (step >= maxSteps) {
            infoDiv.textContent = "Done! Click on canvas to zoom in!";
            return;
          }
  
          await zRealIn.setData(currentZReal);
          await zImagIn.setData(currentZImag);
  
          // Run our dynamic JIT Mandelbrot step function!
          const [realOut, imagOut, magSqOut] = await mandelbrotStep(
            cReal, cImag, zRealIn, zImagIn, upperBound, lowerBound
          );
          
          currentZReal = await realOut.getData();
          currentZImag = await imagOut.getData();
          const magnitudeSqData = await magSqOut.getData();
          
          // Update escape times
          for (let i = 0; i < H * W; i++) {
            if (escapeTimes[i] === 0 && magnitudeSqData[i] >= 4.0) {
              escapeTimes[i] = step;
            }
          }
          
          realOut.delete();
          imagOut.delete();
          magSqOut.delete();
 
          // Render result with color mapping based on escape time!
          const imgData = ctx.createImageData(W, H);
          for (let i = 0; i < H * W; i++) {
            const idx = i * 4;
            const et = escapeTimes[i];
            if (et === 0 && magnitudeSqData[i] < 4.0) {
              // Belongs to set (black)
              imgData.data[idx] = 0;
              imgData.data[idx + 1] = 0;
              imgData.data[idx + 2] = 0;
              imgData.data[idx + 3] = 255;
            } else {
              // Escaped (colored based on escape time!)
              const val = et || step; // Use current step if just escaped!
              imgData.data[idx] = (val * 5) % 256;
              imgData.data[idx + 1] = (val * 13) % 256;
              imgData.data[idx + 2] = (val * 23) % 256;
              imgData.data[idx + 3] = 255;
            }
          }
          ctx.putImageData(imgData, 0, 0);
          
          step++;
          perfDiv.textContent = `Iterations: ${step}`;
          
          requestAnimationFrame(animLoop);
        }
 
        infoDiv.textContent = "Computing Mandelbrot (Animated)...";
        await animLoop();
      }
 
      // Add click listener for zoom
      canvas.addEventListener('click', async (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        // Map mouse coords to complex plane
        const clickX = xMin + (xMax - xMin) * mouseX / W;
        const clickY = yMin + (yMax - yMin) * mouseY / H;
        
        // Zoom in by factor of 2
        const newRangeX = (xMax - xMin) / 2;
        const newRangeY = (yMax - yMin) / 2;
        
        xMin = clickX - newRangeX / 2;
        xMax = clickX + newRangeX / 2;
        yMin = clickY - newRangeY / 2;
        yMax = clickY + newRangeY / 2;
        
        await compute();
      });
 
      await compute(); // Initial compute
    }
 
    runDemo().catch(err => {
      console.error(err);
      document.getElementById('info').textContent = `Error: ${err.message}`;
    });
  </script>
</body>
</html>
