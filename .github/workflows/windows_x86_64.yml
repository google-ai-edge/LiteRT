name: "windows_x86_64"

on:
  push:
    tags:
      - v*
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      REFRESH_CACHE:
        description: "Refresh cache"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  presubmit:
    name: "Presubmit-Win"
    runs-on: windows-latest

    permissions:
      actions: write
      contents: read

    env:
      ANDROID_NDK_HOME:
      LITERT_MODELS: ""
      GH_TOKEN: ${{ github.token }}
      CACHE_PATH: C:\Users\runneradmin\.cache\bazel-windows
      REFRESH_CACHE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.REFRESH_CACHE) }}

    steps:
      # 📦 Checkout
      - uses: actions/checkout@v4

      # 🐍 Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ⚙️ Configure
      - name: Configure TensorFlow
        shell: pwsh
        run: |
          $env:PYTHON_BIN_PATH = (Get-Command python).Source
          $env:PYTHON_LIB_PATH = (python -c "import site; print(site.getsitepackages()[0])")
          $env:TF_NEED_ROCM = 0
          $env:TF_NEED_CUDA = 0
          $env:TF_SET_ANDROID_WORKSPACE = 0
          python configure.py

      # 🧠 Cache key (simplified)
      - name: Setup cache key
        id: cache
        shell: pwsh
        run: |
          $KEY = "${{ runner.os }}-bazel-${{ hashFiles('**/WORKSPACE', '**/BUILD*', '**/.bazelrc') }}"
          echo "key=$KEY" >> $env:GITHUB_OUTPUT

      # 🧹 Clean nếu refresh
      - name: Clean Bazel
        if: env.REFRESH_CACHE == 'true'
        run: bazel clean --expunge_async

      # 📥 Restore cache
      - name: Restore cache
        if: env.REFRESH_CACHE != 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ steps.cache.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # 🧪 Test (auto detect all tests)
      - name: Run tests
        run: |
          bazel test --config=windows --disk_cache=${{ env.CACHE_PATH }} //litert/...

      # 🏗️ Build
      - name: Build
        run: |
          bazel build --config=windows --disk_cache=${{ env.CACHE_PATH }} //litert/...

      # 💾 Save cache
      - name: Save cache
        uses: actions/cache/save@v4
        if: env.REFRESH_CACHE == 'true' || success()
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ steps.cache.outputs.key }}
