name: "linux nightly wheel"

on:
  schedule:
    - cron: "0 6 * * *"  # Run at 6:00 am UTC every day to build nightly wheel.
  workflow_dispatch:
    inputs:
      build_converter:
        description: 'When true, build the converter into the wheels.'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-nightly
  cancel-in-progress: true

jobs:
  build_wheels:
    name: "Build Wheels - Python ${{ matrix.python-version }}"
    runs-on: LiteRT_Linux_x64
    strategy:
      fail-fast: false # Allow other matrix jobs to continue if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up cache keys and bazel output base.
        id: cache-keys
        shell: bash
        run: |
          # The month is used as a cache-buster.
          CACHE_MONTH=$(TZ='America/Los_Angeles' date +%Y-%m)
          CACHE_RESTORE_KEY_2="${{ github.workflow }}-${{ matrix.python-version }}-$CACHE_MONTH"
          echo "CACHE_RESTORE_KEY_2=$CACHE_RESTORE_KEY_2" >> "$GITHUB_OUTPUT"

          if [ -f "WORKSPACE" ]; then
            WORKSPACE_HASH=$(sha256sum WORKSPACE | cut -d' ' -f1)
          fi
          if [ -f ".bazelrc" ]; then
            BAZELRC_HASH=$(sha256sum .bazelrc | cut -d' ' -f1)
          fi
          CACHE_RESTORE_KEY_1="$CACHE_RESTORE_KEY_2-${WORKSPACE_HASH}${BAZELRC_HASH}"
          echo "CACHE_RESTORE_KEY_1=$CACHE_RESTORE_KEY_1" >> "$GITHUB_OUTPUT"

          BUILD_FILES_HASH=""
          for f in $(find . -name 'BUILD' -o -name 'BUILD.bazel'); do
            BUILD_FILES_HASH="${BUILD_FILES_HASH}-$(sha256sum $f | cut -d' ' -f1)"
          done
          # Hash the long BUILD_FILES_HASH to create a shorter, fixed-length key.
          BUILD_FILES_HASH=$(echo -n "${BUILD_FILES_HASH}" | sha256sum | cut -d' ' -f1)
          CACHE_RESTORE_KEY_0="$CACHE_RESTORE_KEY_1-${BUILD_FILES_HASH}"
          echo "CACHE_RESTORE_KEY_0=$CACHE_RESTORE_KEY_0" >> "$GITHUB_OUTPUT"

          CACHE_RESTORE_KEY_HEAD="$CACHE_RESTORE_KEY_0-${{ github.event.pull_request.base.sha }}"
          echo "CACHE_RESTORE_KEY_HEAD=$CACHE_RESTORE_KEY_HEAD" >> "$GITHUB_OUTPUT"

          CACHE_KEY="$CACHE_RESTORE_KEY_0-${{ github.sha }}"
          echo "CACHE_KEY=$CACHE_KEY" >> "$GITHUB_OUTPUT"

          # Use a directory outside of the main checkout for the output base
          # to avoid interfering with the source tree.
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "BAZEL_OUTPUT_BASE=${HOME}/bazel-output-bases/w-$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Restore bazel cache
        id: bazel-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.cache-keys.outputs.CACHE_KEY }}
          restore-keys: |
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_HEAD }}
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_0 }}-
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_1 }}-
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_2 }}-

      - name: Check cache hit
        run: |
          echo "Cache Hit: ${{ steps.bazel-cache.outputs.cache-hit }}"
          echo "Cache Primary Key: ${{ steps.bazel-cache.outputs.cache-primary-key }}"
          echo "Cache Matched Key: ${{ steps.bazel-cache.outputs.cache-matched-key }}"

      - name: Set BAZEL_CONFIG_FLAGS for Cache
        shell: bash
        run: |
          CacheDir="${HOME}/.cache/bazel"
          echo "BAZEL_CONFIG_FLAGS=--disk_cache=$CacheDir" >> "$GITHUB_ENV"

      - name: Build and generate wheel
        env:
          DOCKER_PYTHON_VERSION: ${{ matrix.python-version }}
          CUSTOM_BAZEL_FLAGS: "--config=release_cpu_linux"
          USE_LOCAL_TF: "false"
          TEST_MANYLINUX_COMPLIANCE: "true"
          BAZEL_CONFIG_FLAGS: ${{ env.BAZEL_CONFIG_FLAGS }}
          BUILD_CONVERTER: ${{ inputs.build_converter }}
        run: |
          export NIGHTLY_RELEASE_DATE=$(TZ='America/Los_Angeles' date +%Y%m%d)
          if [[ -f "ci/build_pip_package_with_docker.sh" ]]; then
            chmod +x ci/build_pip_package_with_docker.sh
            echo "INFO: Running build_pip_package_with_docker.sh. Ensure 'bazel clean --expunge' is called inside the container before the build."
            ./ci/build_pip_package_with_docker.sh
          else
            echo "Error: ci/build_pip_package_with_docker.sh not found!"
            exit 1
          fi

      - name: List generated files
        run: |
          echo "Generated files in dist/:"
          find $(pwd)/dist -type f

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lite-rt-artifacts-py${{ matrix.python-version }}-${{ github.run_id }}
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Save bazel cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/bazel
          key: ${{ steps.cache-keys.outputs.CACHE_KEY }}

  upload-to-pypi:
    name: "Upload Nightly Wheels to PyPI"
    runs-on: ubuntu-latest
    needs: build_wheels
    if: success()
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: python -m pip install twine

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lite-rt-artifacts-*
          path: dist
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -R dist

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_UPLOAD_TOKEN }}
        run: twine upload dist/*.whl --non-interactive